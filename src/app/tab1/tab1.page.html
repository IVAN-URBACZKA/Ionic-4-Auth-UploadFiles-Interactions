<ion-header>

  <ion-toolbar color="warning">
  <ion-buttons slot="start">
  <ion-button color="light">
  <ion-icon slot="icon-only" name="logo-instagram"></ion-icon>
  </ion-button>
  </ion-buttons>
  <ion-title>
  InstaLike
  </ion-title>
  <ion-buttons slot="end">
  <ion-button color="light">
  <ion-icon slot="icon-only" name="send"></ion-icon>
  </ion-button>
  </ion-buttons>
  </ion-toolbar>

 </ion-header>

 <ion-card *ngFor="let post of posts">
    <ion-item lines="none">
    <ion-avatar slot="start">
    <img [src]="post.userImg">
    </ion-avatar>
    <ion-label>
    <h2><b>{{ post.userPseudo }}</b></h2>
    <p>{{ post.hour }}</p>
    </ion-label>
    </ion-item>
    <img [src]="post.imgUrl">
    <ion-button (click)="addLike(post)" color="warning"
   fill="clear">
    <ion-icon slot="start" name="heart-empty"></ion-icon> 2
    </ion-button>
    <div class="post_text">
    <ion-label text-wrap>{{ post.description }}</ion-label>
    </div>
   </ion-card>

   <div class="post_text">
      <ion-label text-wrap>Post InstaLike</ion-label>
     </div>

<ion-content>
  <!-- <ion-button (click)="logout()" expand="block" color="danger">Déconnexion</ion-button> -->
</ion-content>
